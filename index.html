<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판다 배드민턴</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #111;
            color: white;
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 1280px;
            aspect-ratio: 16 / 9;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            background-color: #000;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }
        #ui {
            position: absolute;
            top: 30px;
            left: 5%;
            width: 90%;
            display: none; 
            justify-content: space-between;
            font-size: 64px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 4px 4px 0 #000, -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000;
            pointer-events: none;
            z-index: 5;
        }
        #menuUi {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            z-index: 10;
        }
        .menu-title {
            font-size: 90px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 60px;
            text-shadow: 5px 5px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
        }
        .menu-btn {
            font-size: 40px;
            font-weight: bold;
            font-family: inherit;
            padding: 15px 50px;
            margin: 15px;
            background-color: #ffcc00;
            color: #000;
            border: 5px solid #000;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            width: 450px;
        }
        .menu-btn:hover {
            background-color: #ffaa00;
            transform: scale(1.05);
        }
        #alertPopup {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 20px 40px;
            font-size: 32px;
            font-weight: bold;
            border-radius: 10px;
            border: 2px solid #555;
            z-index: 20;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }
    </style>
</head>
<body>

<div id="assets" style="display:none;">
    <img id="bgImg" src="배경.png">
    <img id="pandaIdle" src="판다.png">
    <img id="pandaWalk" src="걷기.gif">
    <img id="shuttleImg" src="셔틀콕.png">
</div>

<div id="gameContainer">
    <img id="p1Gif" style="position: absolute; display: none; z-index: 10; transform-origin: center center; pointer-events: none;">
    <img id="p2Gif" style="position: absolute; display: none; z-index: 10; transform-origin: center center; pointer-events: none;">
    <img id="shuttleDom" style="position: absolute; display: none; z-index: 20; pointer-events: none;">
    <div id="ui">
        <div id="score1">0</div>
        <div id="score2">0</div>
    </div>
    
    <div id="menuUi">
        <div class="menu-title">판다 배드민턴</div>
        <button class="menu-btn" onclick="showConstructionPopup()">혼자서 재미있게~</button>
        <button class="menu-btn" onclick="startGame()">둘이서 함께~</button>
        <button class="menu-btn" onclick="showConstructionPopup()">온라인 플레이</button>
    </div>

    <div id="alertPopup">제작 중입니다.</div>
    
    <canvas id="gameCanvas" width="1280" height="720"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const introImg = new Image();
introImg.src = '인트로.png'; 
const bgImg = document.getElementById('bgImg');
const shuttleImg = document.getElementById('shuttleImg');

const GRAVITY = 0.6;
const SHUTTLECOCK_DRAG = 0.96;
const GROUND_Y = 620;
const NET_X = 640;
const PLAYER_SIZE = 60; 
const NET_HEIGHT = PLAYER_SIZE * 2; 
const NET_WIDTH = 12;
const JUMP_POWER = -Math.sqrt(2 * GRAVITY * (PLAYER_SIZE * 3.5)); 

const game = {
    state: 'INTRO_FADEIN', 
    timer: 60, 
    server: 1, 
    score: [0, 0],
    fadeAlpha: 0,
    timeScale: 1, 
    timeAccumulator: 0
};

const keys = {};
window.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    keys[key] = true;
    if(['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Enter'].includes(e.key)) keys[e.key] = true;

    if (key === 'z' || e.key === 'Enter') {
        if (game.state.startsWith('INTRO_')) {
            game.state = 'MENU_FADEIN';
            game.timer = 60;
            game.fadeAlpha = 1; 
        } else if (game.state === 'MENU_FADEIN') {
            game.state = 'MENU_IDLE';
            game.timer = 0;
            game.fadeAlpha = 0;
            showMenuDOM();
        }
    }
});
window.addEventListener('keyup', (e) => {
    const key = e.key.toLowerCase();
    keys[key] = false;
    if(['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Enter'].includes(e.key)) keys[e.key] = false;
});

function showMenuDOM() {
    document.getElementById('menuUi').style.display = 'flex';
    document.getElementById('menuUi').style.opacity = 1;
}

function showConstructionPopup() {
    const popup = document.getElementById('alertPopup');
    popup.style.opacity = 1;
    setTimeout(() => { popup.style.opacity = 0; }, 1500);
}

function startGame() {
    document.getElementById('menuUi').style.display = 'none';
    document.getElementById('ui').style.display = 'flex';
    resetPositions();
    game.score = [0, 0];
    document.getElementById('score1').innerText = '0';
    document.getElementById('score2').innerText = '0';
    
    game.state = 'FADEIN_READY';
    game.timer = 120;
    game.fadeAlpha = 1;
    game.timeScale = 1;
}

class Player {
    constructor(x, y, isPlayer1) {
        this.x = x;
        this.y = y;
        this.width = PLAYER_SIZE;
        this.height = PLAYER_SIZE;
        this.vx = 0;
        this.vy = 0;
        this.baseSpeed = 7;       
        this.jumpPower = JUMP_POWER; 
        this.isPlayer1 = isPlayer1;
        
        this.isGrounded = false;
        this.isSliding = false;
        this.slideTimer = 0;
        this.slideDir = 1; 
        this.swingTimer = 0; 
        this.prevAction = false;
        this.jumpLocked = false; 
        
        this.idleImg = document.getElementById('pandaIdle');
        this.walkImg = document.getElementById('pandaWalk');
        this.slideImg = new Image();
        this.slideImg.src = '슬라이딩.gif';
        
        this.controls = isPlayer1 ? 
            { left: 'd', right: 'g', jump: 'r', down: 'f', action: 'z' } :
            { left: 'ArrowLeft', right: 'ArrowRight', jump: 'ArrowUp', down: 'ArrowDown', action: 'Enter' };
        this.domElement = document.getElementById(isPlayer1 ? 'p1Gif' : 'p2Gif');
        this.domElement.style.width = (this.width / canvas.width) * 100 + '%';
        this.domElement.style.height = (this.height / canvas.height) * 100 + '%';
        
        this.currentAnim = null; 
    }

    update() {
        if (this.swingTimer > 0) this.swingTimer--;

        if (!keys[this.controls.jump]) {
            this.jumpLocked = false;
        }

        let actionPressed = false;
        if (keys[this.controls.action] && !this.prevAction) actionPressed = true;
        this.prevAction = keys[this.controls.action];

        let isFadeInReady = game.state === 'FADEIN_READY';
        let isServing = game.state === 'SERVING' && 
                        ((game.server === 1 && this.isPlayer1) || (game.server === 2 && !this.isPlayer1));

        if (actionPressed) {
            // 슬라이딩 실행 
            if (this.isGrounded && !this.isSliding && (keys[this.controls.left] || keys[this.controls.right]) && !isServing && !isFadeInReady) {
                this.isSliding = true;
                // 0.6초(36프레임) 이동 + 0.6초(36프레임) 딜레이 = 총 72프레임
                this.slideTimer = 72; 
                this.slideDir = keys[this.controls.left] ? -1 : 1; 
            } 
            else if (this.swingTimer === 0 && !isFadeInReady) {
                let canSwing = !this.isGrounded || this.isSliding || isServing;
                if (canSwing) {
                    this.swingTimer = 24;
                }
            }
        }

        if (this.isSliding) {
            this.slideTimer--;
            
            // 72 ~ 37 프레임 구간 (0.6초 동안): 속도 9로 이동
            if (this.slideTimer > 36) {
                this.vx = 9 * this.slideDir;
            } 
            // 36 ~ 1 프레임 구간 (0.6초 동안): 정지 후딜레이
            else {
                this.vx = 0;
            }
            
            if (this.slideTimer <= 0) {
                this.isSliding = false;
                this.vx = 0; 
            }
        } else {
            if (keys[this.controls.left]) this.vx = -this.baseSpeed;
            else if (keys[this.controls.right]) this.vx = this.baseSpeed;
            else this.vx = 0;
        }

        if (keys[this.controls.jump] && this.isGrounded && !this.isSliding && !isServing && !isFadeInReady && !this.jumpLocked) {
            this.vy = this.jumpPower;
            this.isGrounded = false;
        }

        this.vy += GRAVITY;
        this.x += this.vx;
        this.y += this.vy;

        if (this.y + this.height >= GROUND_Y) {
            this.y = GROUND_Y - this.height;
            this.vy = 0;
            this.isGrounded = true;
        } else {
            this.isGrounded = false;
        }

        if (this.isPlayer1) {
            if (this.x < 0) this.x = 0;
            if (this.x + this.width > NET_X - NET_WIDTH/2) this.x = NET_X - NET_WIDTH/2 - this.width;
        } else {
            if (this.x < NET_X + NET_WIDTH/2) this.x = NET_X + NET_WIDTH/2;
            if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;
        }
    }

    draw(ctx) {
        ctx.save();
        ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
        ctx.beginPath();
        let shadowScale = Math.max(0.5, 1 - (GROUND_Y - (this.y + this.height)) / 200);
        ctx.ellipse(this.x + this.width / 2, GROUND_Y, (this.width / 1.5) * shadowScale, 8 * shadowScale, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        let targetAnim = 'idle';
        let targetSrc = '판다.png';

        if (this.isSliding) {
            targetAnim = 'slide';
            targetSrc = '슬라이딩.gif';
        } else if (this.vx !== 0 && this.isGrounded) {
            targetAnim = 'walk';
            targetSrc = '걷기.gif';
        }

        if (this.currentAnim !== targetAnim) {
            this.currentAnim = targetAnim;
            if (targetAnim === 'slide') {
                this.domElement.src = targetSrc + '?t=' + Date.now();
            } else {
                this.domElement.src = targetSrc;
            }
        }

        this.domElement.style.left = (this.x / canvas.width) * 100 + '%';
        this.domElement.style.top = (this.y / canvas.height) * 100 + '%';
        this.domElement.style.display = 'block';
        this.domElement.style.opacity = 1 - game.fadeAlpha;

        let scaleX = (this.isPlayer1 ? 1 : -1);
        let scaleY = 1;
        
        if (this.isSliding) {
            scaleX = this.slideDir;
        }
        this.domElement.style.transform = `scale(${scaleX}, ${scaleY})`;
    }
}

class Shuttlecock {
    constructor(x, y) {
        // x, y 좌표는 셔틀콕 이미지의 "코르크(빨간 점)"를 의미합니다.
        this.x = x;
        this.y = y;
        // 기존 14에서 0.8배 축소 (코르크 머리 부분의 물리적 충돌 반경)
        this.radius = 11.2; 
        this.vx = 0;
        this.vy = 0;
        this.isDead = false;
        this.img = shuttleImg;
        this.domElement = document.getElementById('shuttleDom');
    }

    update() {
        this.vx *= SHUTTLECOCK_DRAG;
        this.vy *= SHUTTLECOCK_DRAG;
        this.vy += GRAVITY * 0.85;

        this.x += this.vx;
        this.y += this.vy;

        let netLeft = NET_X - NET_WIDTH/2;
        let netRight = NET_X + NET_WIDTH/2;
        let netTop = GROUND_Y - NET_HEIGHT;

        // 네트 충돌 처리 (기준점: 코르크 머리)
        if (this.x + this.radius > netLeft && this.x - this.radius < netRight && this.y + this.radius > netTop && this.y < GROUND_Y) {
            if (this.y < netTop + 8 && this.vy > 0) {
                this.vy *= -0.6;
                this.vx *= 0.5;
                this.y = netTop - this.radius;
            } else {
                // 옆면 충돌 시 좌우 방향만 반전 및 약간 감속 (아래로 꽂히지 않고 튕겨 나옴)
                this.vx *= -0.5;
                if (this.x < NET_X) this.x = netLeft - this.radius;
                else this.x = netRight + this.radius;
            }
        }

        // 바닥 충돌 처리 (기준점: 코르크 머리)
        if (this.y + this.radius >= GROUND_Y) {
            this.y = GROUND_Y - this.radius;
            this.vx = 0;
            this.vy = 0;
            
            if (!this.isDead && game.state === 'PLAYING') {
                this.isDead = true;
                if (this.x < NET_X) {
                    game.score[1]++;
                    game.server = 2; 
                } else {
                    game.score[0]++;
                    game.server = 1;
                }
                document.getElementById('score1').innerText = game.score[0];
                document.getElementById('score2').innerText = game.score[1];
                
                game.state = 'POINT_SCORED';
                game.timer = 60; 
                game.timeScale = 0.2; 
            }
        }
        
        if (this.x - this.radius < 0 || this.x + this.radius > canvas.width) {
            this.vx *= -0.5; 
        }
    }

    draw(ctx) {
        // 1. 그림자 그리기 (캔버스에 유지)
        ctx.save();
        ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
        ctx.beginPath();
        let shadowScale = Math.max(0.2, 1 - (GROUND_Y - this.y) / 400);
        ctx.ellipse(this.x, GROUND_Y, this.radius * 2 * shadowScale, 4 * shadowScale, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // 방향 각도 계산
        let angle = 0;
        if (game.state === 'FADEIN_READY' || game.state === 'SERVING') {
            // 서브 대기 중일 때는 코르크 머리가 아래를 향하도록 설정 (90도)
            angle = Math.PI / 2;
        } else if (!this.isDead && (this.vx !== 0 || this.vy !== 0)) {
            // 날아가는 방향을 향하도록 각도 계산
            angle = Math.atan2(this.vy, this.vx);
        } else if (this.isDead) {
            // 바닥에 떨어졌을 때는 코르크 머리가 바닥을 향하도록 설정
            angle = Math.PI / 2; 
        }

        // 2. 셔틀콕 본체 그리기 (DOM 요소로 z-index 최상위 적용)
        if (this.img.complete && this.img.naturalWidth !== 0) {
            let imgRatio = this.img.naturalHeight / this.img.naturalWidth;
            let drawWidth = 25; // 물리엔진 기준 반경 11.2에 맞는 적절한 시각적 너비 설정
            let drawHeight = drawWidth * imgRatio;

            // 이미지가 오른쪽을 바라보는 셔틀콕이라고 가정.
            // 코르크 머리(빨간 점)가 가로의 약 85%, 세로의 50% 지점에 위치하도록 오프셋 퍼센트 위치 계산
            let leftPx = this.x - drawWidth * 0.85; 
            let topPx = this.y - drawHeight * 0.5;

            this.domElement.src = this.img.src;
            this.domElement.style.width = (drawWidth / canvas.width) * 100 + '%';
            this.domElement.style.height = (drawHeight / canvas.height) * 100 + '%';
            this.domElement.style.left = (leftPx / canvas.width) * 100 + '%';
            this.domElement.style.top = (topPx / canvas.height) * 100 + '%';
            this.domElement.style.transformOrigin = '85% 50%';
            this.domElement.style.transform = `rotate(${angle}rad)`;
            this.domElement.style.display = 'block';
            this.domElement.style.opacity = 1 - game.fadeAlpha;
        } else {
            // 이미지 로딩 전/실패 시 기존 공 모양으로 대체 (캔버스에)
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(angle);
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.restore();
            this.domElement.style.display = 'none';
        }
    }
}

let p1 = new Player(200, GROUND_Y - PLAYER_SIZE, true);
let p2 = new Player(1020, GROUND_Y - PLAYER_SIZE, false);
let shuttle = new Shuttlecock(300, 100);

function checkHit(player, shuttle) {
    if (player.swingTimer <= 0) return;
    if (game.state === 'FADEIN_READY') return;

    if (game.state === 'SERVING') {
        let isServer = (game.server === 1 && player.isPlayer1) || (game.server === 2 && !player.isPlayer1);
        if (!isServer) return; 
    }

    // 셔틀콕의 x,y가 코르크 머리 기준점이므로 계산이 정확하게 맞습니다.
    let testX = shuttle.x;
    let testY = shuttle.y;

    if (shuttle.x < player.x) testX = player.x;
    else if (shuttle.x > player.x + player.width) testX = player.x + player.width;
    
    if (shuttle.y < player.y) testY = player.y;
    else if (shuttle.y > player.y + player.height) testY = player.y + player.height;

    let distance = Math.sqrt((shuttle.x - testX) ** 2 + (shuttle.y - testY) ** 2);

    if (distance <= shuttle.radius + 15) {
        let hVx = 0, hVy = -12; 

        if (keys[player.controls.left]) hVx = -28;
        if (keys[player.controls.right]) hVx = 28;
        if (keys[player.controls.jump]) hVy = -24; 
        if (keys[player.controls.down]) hVy = 20;  

        if (player.isPlayer1) {
            if (hVx < 0) hVx = Math.abs(hVx); 
            if (hVx === 0) hVx = 20; 
        } else {
            if (hVx > 0) hVx = -Math.abs(hVx); 
            if (hVx === 0) hVx = -20; 
        }

        shuttle.vx = hVx;
        shuttle.vy = hVy;
        player.swingTimer = 0; 
        
        if (game.state === 'SERVING') {
            game.state = 'PLAYING';
            if (keys[player.controls.jump]) {
                player.jumpLocked = true;
            }
        }
    }
}

function resetPositions() {
    p1.x = 200; p1.y = GROUND_Y - p1.height; p1.vx = 0; p1.vy = 0; p1.isGrounded = true; p1.isSliding = false; p1.slideDir = 1; p1.currentAnim = null; p1.swingTimer = 0;
    p2.x = 1020; p2.y = GROUND_Y - p2.height; p2.vx = 0; p2.vy = 0; p2.isGrounded = true; p2.isSliding = false; p2.slideDir = -1; p2.currentAnim = null; p2.swingTimer = 0;
    shuttle.isDead = false;
    game.timeScale = 1; 
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (game.state.startsWith('INTRO_')) {
        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (game.state === 'INTRO_FADEIN') {
            game.timer--;
            game.fadeAlpha = 1 - (game.timer / 60);
            if (game.timer <= 0) { game.state = 'INTRO_HOLD'; game.timer = 120; }
        } else if (game.state === 'INTRO_HOLD') {
            game.timer--;
            game.fadeAlpha = 1;
            if (game.timer <= 0) { game.state = 'INTRO_FADEOUT'; game.timer = 60; }
        } else if (game.state === 'INTRO_FADEOUT') {
            game.timer--;
            game.fadeAlpha = game.timer / 60;
            if (game.timer <= 0) { game.state = 'MENU_FADEIN'; game.timer = 60; game.fadeAlpha = 1; }
        }

        ctx.globalAlpha = Math.max(0, Math.min(1, game.fadeAlpha));
        if (introImg.complete && introImg.naturalWidth !== 0) {
            const scale = 1 / 8;
            const drawW = introImg.width * scale;
            const drawH = introImg.height * scale;
            const ix = (canvas.width - drawW) / 2;
            const iy = (canvas.height - drawH) / 2;
            ctx.drawImage(introImg, ix, iy, drawW, drawH);
        }
        ctx.globalAlpha = 1.0;
        requestAnimationFrame(gameLoop);
        return;
    }

    if (bgImg.complete && bgImg.naturalWidth !== 0) {
        ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
    } else {
        ctx.fillStyle = '#87CEEB';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#E5C287';
        ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
    }
    
    ctx.fillStyle = '#666';
    ctx.fillRect(NET_X - NET_WIDTH/2, GROUND_Y - NET_HEIGHT, NET_WIDTH, NET_HEIGHT);

    if (game.state === 'MENU_FADEIN') {
        game.timer--;
        game.fadeAlpha = game.timer / 60; 
        document.getElementById('menuUi').style.display = 'flex';
        document.getElementById('menuUi').style.opacity = 1 - game.fadeAlpha;
        
        ctx.fillStyle = `rgba(0,0,0,${game.fadeAlpha})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (game.timer <= 0) { 
            game.state = 'MENU_IDLE'; 
            document.getElementById('menuUi').style.opacity = 1;
        }
        requestAnimationFrame(gameLoop);
        return;
    } else if (game.state === 'MENU_IDLE') {
        requestAnimationFrame(gameLoop);
        return;
    }

    if (game.state === 'POINT_SCORED') {
        game.timer--;
        if (game.timer <= 0) {
            game.state = 'FADEOUT';
            game.timer = 60; 
            game.timeScale = 0; 
        }
    } 
    else if (game.state === 'FADEOUT') {
        game.timer--;
        game.fadeAlpha = 1 - (game.timer / 60); 
        if (game.timer <= 0) {
            resetPositions();
            game.state = 'FADEIN_READY';
            game.timer = 120; 
            game.timeScale = 1;
        }
    } 
    else if (game.state === 'FADEIN_READY') {
        game.timer--;
        game.fadeAlpha = Math.max(0, (game.timer - 60) / 60);
        if (game.timer <= 0) {
            game.state = 'SERVING';
            game.timer = 300; 
        }
    } 
    else if (game.state === 'SERVING') {
        game.timer--;
        if (game.timer <= 0) {
            game.state = 'TIMEOUT';
            game.timer = 60;
            game.timeScale = 0.2; 
            game.server = game.server === 1 ? 2 : 1; 
        }
    } 
    else if (game.state === 'TIMEOUT') {
        game.timer--;
        if (game.timer <= 0) {
            game.state = 'FADEOUT';
            game.timer = 60;
            game.timeScale = 0;
        }
    }

    game.timeAccumulator += game.timeScale;
    while (game.timeAccumulator >= 1) {
        p1.update();
        p2.update();
        shuttle.update();
        checkHit(p1, shuttle);
        checkHit(p2, shuttle);
        game.timeAccumulator -= 1;
    }

    if (game.state === 'FADEIN_READY' || game.state === 'SERVING') {
        let srv = game.server === 1 ? p1 : p2;
        shuttle.x = srv.x + srv.width / 2;
        shuttle.y = srv.y + srv.height / 2;
        shuttle.vx = 0;
        shuttle.vy = 0;
    }

    p1.draw(ctx);
    p2.draw(ctx);
    shuttle.draw(ctx);

    if (game.state === 'FADEIN_READY') {
        let cycle = Math.floor((120 - game.timer) / 20);
        if (cycle % 2 === 0) {
            ctx.fillStyle = 'red';
            ctx.font = 'bold 80px "Malgun Gothic", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Ready?', canvas.width / 2, 250);

            let srvPlayer = game.server === 1 ? p1 : p2;
            ctx.fillStyle = 'rgba(255, 0, 0, 0.4)';
            ctx.fillRect(srvPlayer.x, srvPlayer.y, srvPlayer.width, srvPlayer.height);
        }
    } else if (game.state === 'TIMEOUT') {
        ctx.fillStyle = 'red';
        ctx.font = 'bold 80px "Malgun Gothic", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Time out', canvas.width / 2, 250);
    }

    if (game.fadeAlpha > 0) {
        ctx.fillStyle = `rgba(0, 0, 0, ${game.fadeAlpha})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</html>
