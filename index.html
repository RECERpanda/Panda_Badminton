<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Badminton Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a202c; color: white; font-family: 'Inter', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .control-panel { pointer-events: auto; }
        .btn { transition: all 0.2s; }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="ui-layer" class="flex flex-col items-center justify-between p-6">
        <div class="flex w-full max-w-4xl justify-between items-center bg-gray-800 bg-opacity-75 p-4 rounded-2xl shadow-lg control-panel">
            <div class="text-3xl font-bold text-blue-400">P1 Score: <span id="score1">0</span></div>
            <div class="flex flex-col items-center gap-2">
                <h1 class="text-2xl font-black text-white tracking-widest">BADMINTON</h1>
                <div class="flex gap-2">
                    <button id="btn-1p" class="btn bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded font-bold shadow-lg">1 Player (vs AI)</button>
                    <button id="btn-2p" class="btn bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded font-bold shadow-lg">2 Players</button>
                </div>
                <div id="ai-difficulty-container" class="flex gap-2 mt-2">
                    <span class="my-auto text-sm text-gray-300">AI Level:</span>
                    <select id="ai-difficulty" class="bg-gray-700 text-white rounded px-2 py-1 outline-none font-bold">
                        <option value="easy">Easy</option>
                        <option value="normal">Normal</option>
                        <option value="hard" selected>Hard (Unbeatable)</option>
                    </select>
                </div>
            </div>
            <div class="text-3xl font-bold text-red-400">P2 Score: <span id="score2">0</span></div>
        </div>
        
        <div id="status-msg" class="text-4xl font-black text-yellow-300 animate-pulse mt-20 opacity-0 transition-opacity duration-300">POINT!</div>

        <div class="bg-gray-800 bg-opacity-50 p-4 rounded-xl mt-auto control-panel text-sm text-center shadow-xl">
            <p><strong class="text-blue-300">P1 (Left):</strong> W(Jump), A/D(Move), S(Slide), Space(Swing)</p>
            <p><strong class="text-red-300">P2 (Right):</strong> Up(Jump), Left/Right(Move), Down(Slide), Enter(Swing)</p>
            <p class="text-green-300 mt-2">💡 <strong>Tip:</strong> 슬라이딩(S/Down) 중에는 셔틀콕이 닿기만 해도 자동으로 스윙합니다!</p>
            <p class="text-green-300">💡 <strong>Tip:</strong> 몸 뒤쪽(파란색 히트박스)에서 치면 무조건 위로 높게 뜹니다.</p>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Resize canvas to fill window
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Game State Variables
        let mode = '1p'; // '1p' or '2p'
        let aiDifficulty = 'hard';
        let score1 = 0;
        let score2 = 0;
        let isPlaying = true;
        
        // Physics & World Constants
        const GRAVITY = 0.5;
        const DRAG = 0.985;
        const FLOOR_Y = canvas.height - 100;
        const NET_X = canvas.width / 2;
        const NET_WIDTH = 10; // 얇은 네트 막대기
        const NET_HEIGHT = 200;
        const NET_TOP_Y = FLOOR_Y - NET_HEIGHT;
        const NET_TOP_RADIUS = 10; // 네트 윗부분 원

        // Keys state
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // UI Elements
        const score1El = document.getElementById('score1');
        const score2El = document.getElementById('score2');
        const statusMsg = document.getElementById('status-msg');

        document.getElementById('btn-1p').addEventListener('click', () => setMode('1p'));
        document.getElementById('btn-2p').addEventListener('click', () => setMode('2p'));
        document.getElementById('ai-difficulty').addEventListener('change', (e) => aiDifficulty = e.target.value);

        function setMode(newMode) {
            mode = newMode;
            document.getElementById('ai-difficulty-container').style.display = (mode === '1p') ? 'flex' : 'none';
            resetGame(true);
        }

        class Shuttlecock {
            constructor() {
                this.reset(true);
                this.radius = 8;
            }

            reset(toLeft) {
                this.x = toLeft ? canvas.width * 0.25 : canvas.width * 0.75;
                this.y = FLOOR_Y - 200;
                this.vx = 0;
                this.vy = 0;
                this.isDead = false;
            }

            update() {
                if (this.isDead) return;

                // Apply physics
                this.vy += GRAVITY;
                this.vx *= DRAG;
                this.vy *= DRAG;
                this.x += this.vx;
                this.y += this.vy;

                // Floor collision (Point scored)
                if (this.y + this.radius >= FLOOR_Y) {
                    this.y = FLOOR_Y - this.radius;
                    this.isDead = true;
                    handlePointScored(this.x < NET_X ? 2 : 1);
                }

                // Wall collision (Out of bounds bounce)
                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx *= -0.5;
                } else if (this.x + this.radius > canvas.width) {
                    this.x = canvas.width - this.radius;
                    this.vx *= -0.5;
                }

                // Net Collision Logic (얇은 막대기 + 맨 위 원형 구조 완벽 처리)
                
                // 1. 네트 맨 위 원과의 충돌 검사
                let distToTop = Math.hypot(this.x - NET_X, this.y - NET_TOP_Y);
                if (distToTop <= this.radius + NET_TOP_RADIUS) {
                    // 겹침 해결 (밀어내기)
                    let angle = Math.atan2(this.y - NET_TOP_Y, this.x - NET_X);
                    this.x = NET_X + Math.cos(angle) * (this.radius + NET_TOP_RADIUS);
                    this.y = NET_TOP_Y + Math.sin(angle) * (this.radius + NET_TOP_RADIUS);
                    
                    // 속도 반사 (튕기기)
                    let speed = Math.hypot(this.vx, this.vy);
                    // 네트 위에서 죽는 것을 방지하기 위해 튕길때 최소 탄성 유지
                    this.vx = Math.cos(angle) * speed * 0.7;
                    this.vy = Math.sin(angle) * speed * 0.7;
                } 
                // 2. 네트 기둥(얇은 막대기)과의 충돌 검사
                else if (this.y > NET_TOP_Y && Math.abs(this.x - NET_X) < (NET_WIDTH / 2 + this.radius)) {
                    if (this.x < NET_X) { // 왼쪽에서 부딪힘
                        this.x = NET_X - NET_WIDTH / 2 - this.radius;
                        this.vx = -Math.abs(this.vx) * 0.8; // 왼쪽으로 튕김
                    } else { // 오른쪽에서 부딪힘
                        this.x = NET_X + NET_WIDTH / 2 + this.radius;
                        this.vx = Math.abs(this.vx) * 0.8; // 오른쪽으로 튕김
                    }
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // 셔틀콕 헤드 (반구)
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();

                // 셔틀콕 깃털 (방향에 따라 회전)
                let angle = Math.atan2(this.vy, this.vx);
                if (Math.abs(this.vx) < 0.1 && Math.abs(this.vy) < 0.1) angle = -Math.PI/2;
                ctx.rotate(angle);
                
                ctx.beginPath();
                ctx.moveTo(-this.radius, -this.radius);
                ctx.lineTo(-this.radius * 3, -this.radius * 1.5);
                ctx.lineTo(-this.radius * 3, this.radius * 1.5);
                ctx.lineTo(-this.radius, this.radius);
                ctx.fillStyle = '#eee';
                ctx.fill();
                ctx.strokeStyle = '#ccc';
                ctx.stroke();

                ctx.restore();
            }
        }

        class Player {
            constructor(isLeft) {
                this.isLeft = isLeft;
                this.width = 30;
                this.height = 70;
                this.hitboxRadius = 75; // 스윙 판정 범위 반경
                this.color = isLeft ? '#3b82f6' : '#ef4444';
                this.reset();
            }

            reset() {
                this.x = this.isLeft ? canvas.width * 0.2 : canvas.width * 0.8;
                this.y = FLOOR_Y - this.height / 2;
                this.vx = 0;
                this.vy = 0;
                this.speed = 7;
                this.jumpPower = -12;
                this.isSliding = false;
                this.slideTimer = 0;
                this.hitCooldown = 0; // 연속 히트 방지 쿨다운
                this.swingAnim = 0;
            }

            update(shuttle) {
                // 물리 엔진 (중력)
                this.vy += GRAVITY;
                this.y += this.vy;
                this.x += this.vx;

                // 바닥 충돌
                if (this.y >= FLOOR_Y - this.height / 2) {
                    this.y = FLOOR_Y - this.height / 2;
                    this.vy = 0;
                }

                // 이동 제한 (네트 및 화면 밖)
                if (this.isLeft) {
                    if (this.x < this.width/2) this.x = this.width/2;
                    if (this.x > NET_X - this.width/2 - NET_WIDTH/2) this.x = NET_X - this.width/2 - NET_WIDTH/2;
                } else {
                    if (this.x > canvas.width - this.width/2) this.x = canvas.width - this.width/2;
                    if (this.x < NET_X + this.width/2 + NET_WIDTH/2) this.x = NET_X + this.width/2 + NET_WIDTH/2;
                }

                // 슬라이딩 타이머 처리
                if (this.isSliding) {
                    this.slideTimer--;
                    if (this.slideTimer <= 0) {
                        this.isSliding = false;
                    }
                    
                    // 슬라이딩 중 셔틀콕 자동 스윙 로직!
                    if (this.hitCooldown === 0 && !shuttle.isDead) {
                        let dist = Math.hypot(shuttle.x - this.x, shuttle.y - this.y);
                        if (dist <= this.hitboxRadius) {
                            this.performHit(shuttle); // 닿기만 하면 스윙
                            this.swingAnim = 10;
                        }
                    }
                }

                if (this.hitCooldown > 0) this.hitCooldown--;
                if (this.swingAnim > 0) this.swingAnim--;
            }

            moveLeft() { if (!this.isSliding) this.vx = -this.speed; }
            moveRight() { if (!this.isSliding) this.vx = this.speed; }
            stop() { if (!this.isSliding) this.vx = 0; }
            jump() { if (this.y >= FLOOR_Y - this.height / 2 && !this.isSliding) this.vy = this.jumpPower; }
            
            slide(direction) {
                if (!this.isSliding && this.y >= FLOOR_Y - this.height / 2) {
                    this.isSliding = true;
                    this.slideTimer = 25;
                    this.vx = direction * (this.speed * 1.8);
                }
            }

            trySwing(shuttle) {
                this.swingAnim = 10;
                if (this.hitCooldown > 0 || shuttle.isDead) return;

                let dx = shuttle.x - this.x;
                let dy = shuttle.y - this.y;
                let dist = Math.hypot(dx, dy);

                if (dist <= this.hitboxRadius) {
                    this.performHit(shuttle);
                }
            }

            performHit(shuttle) {
                let dx = shuttle.x - this.x;
                
                // 앞쪽 반원(Front)인지 몸 뒤쪽(Back)인지 판별
                let isFrontHalf = this.isLeft ? (dx >= 0) : (dx <= 0);

                if (isFrontHalf) {
                    // 앞쪽 반원 스윙: 상대편을 향해 강하게 타격
                    shuttle.vx = this.isLeft ? 18 : -18;
                    shuttle.vy = -14; 
                } else {
                    // 뒤쪽 반원 스윙 (무조건 수직 위로 띄움 -> 뒤로 넘어가는 것 방지)
                    // 약간의 전진 속도만 주어 네트 쪽으로 살짝 이동하게 함
                    shuttle.vx = this.isLeft ? 2 : -2; 
                    shuttle.vy = -22; // 아주 높게 수직으로 솟구침
                }

                this.hitCooldown = 15; // 15프레임 쿨다운
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);

                // 히트박스 시각화 (앞쪽=초록, 뒤쪽=파랑)
                ctx.beginPath();
                if (this.isLeft) {
                    ctx.arc(0, 0, this.hitboxRadius, -Math.PI/2, Math.PI/2);
                } else {
                    ctx.arc(0, 0, this.hitboxRadius, Math.PI/2, Math.PI*1.5);
                }
                ctx.fillStyle = 'rgba(74, 222, 128, 0.15)'; // Green (앞쪽 - 정상타격)
                ctx.fill();

                ctx.beginPath();
                if (this.isLeft) {
                    ctx.arc(0, 0, this.hitboxRadius, Math.PI/2, Math.PI*1.5);
                } else {
                    ctx.arc(0, 0, this.hitboxRadius, -Math.PI/2, Math.PI/2);
                }
                ctx.fillStyle = 'rgba(96, 165, 250, 0.15)'; // Blue (뒤쪽 - 수직타격)
                ctx.fill();

                // Player Body (슬라이딩 시 눕히기)
                if (this.isSliding) {
                    ctx.rotate(this.isLeft ? Math.PI/2 : -Math.PI/2);
                }
                
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
                
                // Swing Animation (라켓 시각화)
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 4;
                ctx.beginPath();
                if (this.swingAnim > 0) {
                    ctx.moveTo(0, 0);
                    let swingDir = this.isLeft ? 1 : -1;
                    ctx.lineTo(swingDir * 40, -40);
                } else {
                    ctx.moveTo(0, 0);
                    let holdDir = this.isLeft ? 1 : -1;
                    ctx.lineTo(holdDir * 20, -40);
                }
                ctx.stroke();

                ctx.restore();
            }
        }

        const p1 = new Player(true);
        const p2 = new Player(false);
        const shuttlecock = new Shuttlecock();

        function predictLandingX(shuttle) {
            let sx = shuttle.x;
            let sy = shuttle.y;
            let svx = shuttle.vx;
            let svy = shuttle.vy;
            let limit = 300; // 무한루프 방지
            
            while (sy < FLOOR_Y && limit > 0) {
                svy += GRAVITY;
                svx *= DRAG;
                svy *= DRAG;
                sx += svx;
                sy += svy;
                
                // 간단한 네트 충돌 시뮬레이션
                if (sy > NET_TOP_Y && Math.abs(sx - NET_X) < NET_WIDTH/2 + shuttle.radius) {
                    svx *= -0.8;
                }
                limit--;
            }
            return sx;
        }

        function updateAI(aiPlayer, shuttle) {
            if (shuttle.isDead) return;

            if (aiDifficulty === 'hard') {
                // HARD 모드: 무조건 완벽하게 궤도를 예측하고 완벽한 위치에 대기
                if (shuttle.x > NET_X && shuttle.vx > 0) { // 셔틀콕이 AI 쪽으로 오고 있을 때
                    let targetX = predictLandingX(shuttle);
                    
                    // 앞쪽 반원(초록색 영역)에서 완벽하게 치기 위한 최적의 목표 위치 계산
                    // AI는 오른쪽(isLeft=false)이므로 타겟보다 약간 오른쪽에 서있어야 앞쪽 반원에 들어옴
                    let optimalX = targetX + 30; 
                    
                    // 최적 위치로 무자비한 속도로 이동 (실수 없음)
                    let aiSpeed = 10; 
                    if (aiPlayer.x < optimalX - 5) {
                        aiPlayer.vx = aiSpeed;
                    } else if (aiPlayer.x > optimalX + 5) {
                        aiPlayer.vx = -aiSpeed;
                    } else {
                        aiPlayer.vx = 0;
                    }

                    // 셔틀콕이 높이 있으면 완벽한 타이밍에 점프
                    if (shuttle.y < aiPlayer.y - 100 && shuttle.y > aiPlayer.y - 200 && Math.abs(aiPlayer.x - shuttle.x) < 40) {
                        aiPlayer.jump();
                    }

                    // 완벽한 스윙 타이밍 (히트박스 안에 들어왔고, 네트 방향 앞쪽일 때)
                    let dist = Math.hypot(shuttle.x - aiPlayer.x, shuttle.y - aiPlayer.y);
                    if (dist < aiPlayer.hitboxRadius) {
                        // 셔틀콕이 플레이어 몸통 높이 근처로 내려왔을 때 타격
                        if (shuttle.y > aiPlayer.y - aiPlayer.hitboxRadius * 0.8) {
                            aiPlayer.trySwing(shuttle);
                        }
                    }
                } else {
                    // 상대편 코트에 있을 때는 중앙으로 완벽히 복귀
                    let homeX = canvas.width * 0.75;
                    if (aiPlayer.x < homeX - 5) aiPlayer.vx = 7;
                    else if (aiPlayer.x > homeX + 5) aiPlayer.vx = -7;
                    else aiPlayer.vx = 0;
                }
            } 
            else {
                // Easy / Normal AI 로직 (기존보다 단순하게, 실수를 유발)
                let reactionSpeed = aiDifficulty === 'normal' ? 6 : 4;
                if (shuttle.x > NET_X) {
                    if (aiPlayer.x < shuttle.x - 20) aiPlayer.vx = reactionSpeed;
                    else if (aiPlayer.x > shuttle.x + 20) aiPlayer.vx = -reactionSpeed;
                    else aiPlayer.vx = 0;

                    let dist = Math.hypot(shuttle.x - aiPlayer.x, shuttle.y - aiPlayer.y);
                    if (dist < aiPlayer.hitboxRadius) {
                        // 렌덤하게 늦거나 이상한 타이밍에 스윙 (어려움과의 차별점)
                        if (Math.random() < 0.2) aiPlayer.trySwing(shuttle);
                    }
                } else {
                    let homeX = canvas.width * 0.75;
                    if (aiPlayer.x < homeX - 10) aiPlayer.vx = reactionSpeed;
                    else if (aiPlayer.x > homeX + 10) aiPlayer.vx = -reactionSpeed;
                    else aiPlayer.vx = 0;
                }
            }
        }

        function handleInput() {
            // P1 Input
            if (!p1.isSliding) p1.vx = 0;
            if (keys['KeyA']) p1.moveLeft();
            if (keys['KeyD']) p1.moveRight();
            if (keys['KeyW']) p1.jump();
            if (keys['KeyS'] && !p1.isSliding) p1.slide(keys['KeyA'] ? -1 : 1);
            
            // P1 Swing (Space)
            if (keys['Space']) {
                p1.trySwing(shuttlecock);
                keys['Space'] = false; // Prevent continuous holding
            }

            // P2 Input (If 2P mode)
            if (mode === '2p') {
                if (!p2.isSliding) p2.vx = 0;
                if (keys['ArrowLeft']) p2.moveLeft();
                if (keys['ArrowRight']) p2.moveRight();
                if (keys['ArrowUp']) p2.jump();
                if (keys['ArrowDown'] && !p2.isSliding) p2.slide(keys['ArrowLeft'] ? -1 : 1);
                
                if (keys['Enter']) {
                    p2.trySwing(shuttlecock);
                    keys['Enter'] = false;
                }
            }
        }

        function handlePointScored(winner) {
            if (winner === 1) score1++;
            else score2++;
            
            score1El.textContent = score1;
            score2El.textContent = score2;
            
            statusMsg.textContent = `PLAYER ${winner} SCORE!`;
            statusMsg.style.opacity = 1;

            setTimeout(() => {
                statusMsg.style.opacity = 0;
                resetGame(false, winner === 2); // 진 사람이 서브권
            }, 2000);
        }

        function resetGame(fullReset = false, serveToLeft = true) {
            if (fullReset) {
                score1 = 0;
                score2 = 0;
                score1El.textContent = '0';
                score2El.textContent = '0';
            }
            p1.reset();
            p2.reset();
            shuttlecock.reset(serveToLeft);
        }

        function drawBackground() {
            // 코트 배경
            ctx.fillStyle = '#2d3748';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 바닥
            ctx.fillStyle = '#4a5568';
            ctx.fillRect(0, FLOOR_Y, canvas.width, canvas.height - FLOOR_Y);
            
            // 코트 라인
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(100, FLOOR_Y);
            ctx.lineTo(canvas.width - 100, FLOOR_Y);
            ctx.stroke();

            // 네트 (얇은 막대기)
            ctx.fillStyle = '#cbd5e0';
            ctx.fillRect(NET_X - NET_WIDTH/2, NET_TOP_Y, NET_WIDTH, NET_HEIGHT);
            
            // 네트 윗부분 (둥근 원) - 셔틀콕이 안 걸리게 하는 핵심 구조
            ctx.beginPath();
            ctx.arc(NET_X, NET_TOP_Y, NET_TOP_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = '#f56565'; // 빨간색으로 포인트
            ctx.fill();
        }

        function gameLoop() {
            if (isPlaying) {
                handleInput();
                
                p1.update(shuttlecock);
                if (mode === '2p') {
                    p2.update(shuttlecock);
                } else {
                    p2.update(shuttlecock); // 중력 등 기본 업데이트
                    updateAI(p2, shuttlecock); // AI 조작
                }
                
                shuttlecock.update();
                
                drawBackground();
                p1.draw(ctx);
                p2.draw(ctx);
                shuttlecock.draw(ctx);
            }
            
            requestAnimationFrame(gameLoop);
        }

        // Start game
        gameLoop();

    </script>
</body>
</html>
