<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판다 배드민턴</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #111;
            color: white;
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 1280px;
            aspect-ratio: 16 / 9;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            background-color: #000;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }
        #ui {
            position: absolute;
            top: 30px;
            left: 5%;
            width: 90%;
            display: none; 
            justify-content: space-between;
            font-size: 64px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 4px 4px 0 #000, -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000;
            pointer-events: none;
            z-index: 5;
        }
        #menuUi {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            z-index: 10;
        }
        .menu-title {
            font-size: 90px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 60px;
            text-shadow: 5px 5px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
        }
        .menu-btn {
            font-size: 40px;
            font-weight: bold;
            font-family: inherit;
            padding: 15px 50px;
            margin: 15px;
            background-color: #ffcc00;
            color: #000;
            border: 5px solid #000;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            width: 450px;
        }
        .menu-btn:hover {
            background-color: #ffaa00;
            transform: scale(1.05);
        }
        #alertPopup {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 20px 40px;
            font-size: 32px;
            font-weight: bold;
            border-radius: 10px;
            border: 2px solid #555;
            z-index: 20;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }
        #singleSetupUi {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 15;
        }
        .setup-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .setup-btn {
            font-size: 32px;
            font-weight: bold;
            font-family: inherit;
            padding: 15px 30px;
            background-color: #333;
            color: #fff;
            border: 4px solid #555;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .setup-btn:hover:not(.disabled) {
            background-color: #ffaa00;
            border-color: #000;
            color: #000;
            transform: scale(1.05);
        }
        .setup-btn.selected {
            background-color: #ffcc00;
            border-color: #000;
            color: #000;
            box-shadow: 0 0 15px #ffaa00;
        }
        .setup-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .menu-btn-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .setting-icon-btn {
            font-size: 30px;
            padding: 10px 15px;
            margin: 15px 0 15px 15px;
            background-color: #333;
            color: #fff;
            border: 5px solid #000;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .setting-icon-btn:hover {
            background-color: #555;
            transform: scale(1.05);
        }
        #settingsOverlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 25;
            display: none;
        }
        #settingsUi {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #222;
            border: 5px solid #ffcc00;
            border-radius: 20px;
            padding: 40px;
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 30;
            color: white;
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }
        .settings-title {
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #ffcc00;
        }
        .settings-label {
            font-size: 24px;
            margin-bottom: 15px;
            color: #aaa;
        }
        .settings-row {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .set-btn {
            font-size: 20px;
            font-weight: bold;
            font-family: inherit;
            padding: 10px 20px;
            background-color: #444;
            color: #fff;
            border: 3px solid #666;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .set-btn.selected {
            background-color: #ffcc00;
            color: #000;
            border-color: #fff;
        }
        .set-btn:hover:not(.selected) {
            background-color: #666;
        }
        .confirm-btn {
            align-self: flex-end;
            font-size: 24px;
            font-weight: bold;
            padding: 10px 30px;
            background-color: #ffaa00;
            color: #000;
            border: 3px solid #fff;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }
        .confirm-btn:hover {
            background-color: #ffcc00;
        }
    </style>
</head>
<body>

<div id="assets" style="display:none;">
    <img id="bgImg" src="배경.png">
    <img id="pandaIdle" src="판다.png">
    <img id="pandaWalk" src="걷기.gif">
    <img id="pandaSlide" src="슬라이딩.png">
    <img id="pandaDelay" src="딜레이.png">
    <img id="shuttleImg" src="셔틀콕.png">
</div>

<div id="gameContainer">
    <img id="p1Gif" style="position: absolute; display: none; z-index: 10; transform-origin: center center; pointer-events: none;">
    <img id="p2Gif" style="position: absolute; display: none; z-index: 10; transform-origin: center center; pointer-events: none;">
    <div id="p1Hitbox" style="position: absolute; display: none; z-index: 15; border-radius: 50%; background-color: rgba(255, 0, 0, 0.4); pointer-events: none; transform: translate(-50%, -50%); aspect-ratio: 1/1;"></div>
    <div id="p2Hitbox" style="position: absolute; display: none; z-index: 15; border-radius: 50%; background-color: rgba(255, 0, 0, 0.4); pointer-events: none; transform: translate(-50%, -50%); aspect-ratio: 1/1;"></div>
    <img id="shuttleDom" style="position: absolute; display: none; z-index: 20; transform-origin: center center; pointer-events: none;">
    <div id="ui">
        <div id="score1">0</div>
        <div id="score2">0</div>
    </div>
    
    <div id="menuUi">
        <div class="menu-title">판다 배드민턴</div>
        <div class="menu-btn-wrapper">
            <button class="menu-btn" onclick="showSingleSetup()">혼자서 재미있게~</button>
            <button class="setting-icon-btn" onclick="openSettings()">🔧</button>
        </div>
        <div class="menu-btn-wrapper">
            <button class="menu-btn" onclick="startMultiGame()">둘이서 함께~</button>
            <button class="setting-icon-btn" onclick="openSettings()">🔧</button>
        </div>
        <button class="menu-btn" onclick="showConstructionPopup()">온라인 플레이</button>
    </div>

    <div id="settingsOverlay"></div>
    <div id="settingsUi">
        <div class="settings-title">게임 설정</div>
        <div class="settings-label">목표 점수</div>
        <div class="settings-row" id="scoreSettings">
            <button class="set-btn" onclick="tempSettings.targetScore = 5; updateSettingsUI();">5점</button>
            <button class="set-btn" onclick="tempSettings.targetScore = 10; updateSettingsUI();">10점</button>
            <button class="set-btn" onclick="tempSettings.targetScore = 15; updateSettingsUI();">15점</button>
        </div>
        <div class="settings-label">게임 속도</div>
        <div class="settings-row" id="speedSettings">
            <button class="set-btn" onclick="tempSettings.speed = 0.8; updateSettingsUI();">느리게</button>
            <button class="set-btn" onclick="tempSettings.speed = 1.0; updateSettingsUI();">보통</button>
            <button class="set-btn" onclick="tempSettings.speed = 1.2; updateSettingsUI();">빠르게</button>
        </div>
        <button class="confirm-btn" onclick="applySettings()">확인</button>
    </div>

    <div id="singleSetupUi">
        <div class="menu-title" style="font-size: 60px; margin-bottom: 20px;">난이도 선택</div>
        <div class="setup-row">
            <button class="setup-btn diff-btn" id="btnDiff1" onclick="selectDifficulty('easy')">[1] 쉬움</button>
            <button class="setup-btn diff-btn" id="btnDiff2" onclick="selectDifficulty('normal')">[2] 보통</button>
            <button class="setup-btn diff-btn" id="btnDiff3" onclick="selectDifficulty('hard')">[3] 어려움</button>
        </div>
        <div class="menu-title" style="font-size: 60px; margin-top: 40px; margin-bottom: 20px; color: #888;" id="courtTitle">코트 선택</div>
        <div class="setup-row">
            <button class="setup-btn court-btn disabled" id="btnCourtZ" onclick="selectCourt('left')">[Z] 왼쪽</button>
            <button class="setup-btn court-btn disabled" id="btnCourtEnter" onclick="selectCourt('right')">[Enter] 오른쪽</button>
        </div>
    </div>

    <div id="alertPopup">제작 중입니다.</div>
    
    <canvas id="gameCanvas" width="1280" height="720"></canvas>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    window.appSettings = { targetScore: 15, speed: 1.2 };
    let db, auth, userId;

    try {
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'panda-badminton-v1';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        
        if (firebaseConfig) {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            
            const token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
            
            (async () => {
                try {
                    if (token) {
                        await signInWithCustomToken(auth, token);
                    } else {
                        await signInAnonymously(auth);
                    }
                    userId = auth.currentUser.uid;
                    loadSettings();
                } catch (e) { console.error("Auth error:", e); }
            })();
        }
    } catch(e) { console.error("Firebase init failed:", e); }

    async function loadSettings() {
        if (!db || !userId) return;
        try {
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'panda-badminton-v1';
            const docRef = doc(db, 'artifacts', appId, 'users', userId, 'settings');
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                window.appSettings = { ...window.appSettings, ...docSnap.data() };
            }
        } catch(e) { console.error(e); }
    }

    window.saveSettingsToDb = async function() {
        if (!db || !userId) return;
        try {
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'panda-badminton-v1';
            const docRef = doc(db, 'artifacts', appId, 'users', userId, 'settings');
            await setDoc(docRef, window.appSettings);
        } catch(e) { console.error(e); }
    }
</script>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const introImg = new Image();
introImg.src = '인트로.png'; 
const bgImg = document.getElementById('bgImg');
const shuttleImg = document.getElementById('shuttleImg');

const GRAVITY = 0.6;
const SHUTTLECOCK_DRAG = 0.96;
const GROUND_Y = 620;
const NET_X = 640;
const PLAYER_SIZE = 60; 
const NET_HEIGHT = PLAYER_SIZE * 2;
const NET_WIDTH = 6;
const NET_CAP_RADIUS = 10;
const HITBOX_RADIUS = 55; 
const JUMP_POWER = -Math.sqrt(2 * GRAVITY * (PLAYER_SIZE * 3.5));

// 얇은 기둥과 상단 원을 하나의 연속된 단단한 네트로 처리한다.
// 실제 셔틀콕과 AI 예측이 같은 함수를 사용하므로 보이는 네트와 물리가 어긋나지 않는다.
function resolveNetCollision(body) {
    const netTop = GROUND_Y - NET_HEIGHT;
    const halfWidth = NET_WIDTH / 2;
    const capX = NET_X;
    const capY = netTop;

    // 상단 원 충돌: 어느 방향에서 닿아도 법선 방향으로 튕긴다.
    const dx = body.x - capX;
    const dy = body.y - capY;
    const minDistance = body.radius + NET_CAP_RADIUS;
    const distanceSq = dx * dx + dy * dy;
    if (distanceSq < minDistance * minDistance) {
        const distance = Math.sqrt(distanceSq) || 0.001;
        const nx = dx / distance;
        const ny = dy / distance;
        body.x = capX + nx * minDistance;
        body.y = capY + ny * minDistance;
        const velocityAlongNormal = body.vx * nx + body.vy * ny;
        if (velocityAlongNormal < 0) {
            body.vx -= 1.5 * velocityAlongNormal * nx;
            body.vy -= 1.5 * velocityAlongNormal * ny;
            body.vx *= 0.72;
            body.vy *= 0.72;
        }
        return true;
    }

    // 기둥의 양 옆과 바닥까지 모두 동일한 반사 물리를 적용한다.
    const overlapsPole = body.y + body.radius > netTop &&
        body.y - body.radius < GROUND_Y &&
        body.x + body.radius > NET_X - halfWidth &&
        body.x - body.radius < NET_X + halfWidth;
    if (overlapsPole) {
        if (body.x <= NET_X) {
            body.x = NET_X - halfWidth - body.radius;
            if (body.vx > 0) body.vx *= -0.55;
        } else {
            body.x = NET_X + halfWidth + body.radius;
            if (body.vx < 0) body.vx *= -0.55;
        }
        body.vy *= 0.82;
        return true;
    }
    return false;
}

const game = {
    state: 'INTRO_FADEIN', 
    timer: 60, 
    server: 1, 
    score: [0, 0],
    fadeAlpha: 0,
    timeScale: 1, 
    timeAccumulator: 0,
    isSingle: false,
    difficulty: null,
    playerSide: null,
    netDepression: 0
};

let tempSettings = { targetScore: 15, speed: 1.2 };

const keys = {};
window.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    keys[key] = true;
    if(['arrowleft', 'arrowright', 'arrowup', 'arrowdown', 'enter'].includes(key)) keys[e.key] = true;

    if (game.state === 'SINGLE_SETUP') {
        if (key === '1') selectDifficulty('easy');
        if (key === '2') selectDifficulty('normal');
        if (key === '3') selectDifficulty('hard');
        if (key === 'z') selectCourt('left');
        if (key === 'enter') selectCourt('right');
        return;
    }

    if (key === 'z' || key === 'enter') {
        if (game.state.startsWith('INTRO_')) {
            game.state = 'MENU_FADEIN';
            game.timer = 60;
            game.fadeAlpha = 1; 
        } else if (game.state === 'MENU_FADEIN') {
            game.state = 'MENU_IDLE';
            game.timer = 0;
            game.fadeAlpha = 0;
            showMenuDOM();
        }
    }

    if (game.state === 'GAME_SET_WAIT_KEY') {
        if (key === 'z' || key === 'enter') {
            game.state = 'GAME_SET_TRANSITION_IN';
            game.timer = 60;
        }
    }
});
window.addEventListener('keyup', (e) => {
    const key = e.key.toLowerCase();
    keys[key] = false;
    if(['arrowleft', 'arrowright', 'arrowup', 'arrowdown', 'enter'].includes(key)) keys[e.key] = false;
});

function showMenuDOM() {
    document.getElementById('menuUi').style.display = 'flex';
    document.getElementById('menuUi').style.opacity = 1;
}

function openSettings() {
    if (!window.appSettings) window.appSettings = { targetScore: 15, speed: 1.2 };
    tempSettings = { ...window.appSettings };
    document.getElementById('settingsOverlay').style.display = 'block';
    document.getElementById('settingsUi').style.display = 'flex';
    updateSettingsUI();
}

function updateSettingsUI() {
    const scoreBtns = document.getElementById('scoreSettings').querySelectorAll('.set-btn');
    scoreBtns.forEach(btn => {
        btn.classList.remove('selected');
        if (parseInt(btn.innerText) === tempSettings.targetScore) btn.classList.add('selected');
    });

    const speedBtns = document.getElementById('speedSettings').querySelectorAll('.set-btn');
    speedBtns.forEach(btn => {
        btn.classList.remove('selected');
        let txt = btn.innerText;
        if (txt === '느리게' && tempSettings.speed === 0.8) btn.classList.add('selected');
        if (txt === '보통' && tempSettings.speed === 1.0) btn.classList.add('selected');
        if (txt === '빠르게' && tempSettings.speed === 1.2) btn.classList.add('selected');
    });
}

function applySettings() {
    window.appSettings = { ...tempSettings };
    if (window.saveSettingsToDb) {
        window.saveSettingsToDb();
    }
    document.getElementById('settingsOverlay').style.display = 'none';
    document.getElementById('settingsUi').style.display = 'none';
}

function showConstructionPopup() {
    const popup = document.getElementById('alertPopup');
    popup.style.opacity = 1;
    setTimeout(() => { popup.style.opacity = 0; }, 1500);
}

function showSingleSetup() {
    game.state = 'SINGLE_SETUP';
    document.getElementById('menuUi').style.display = 'none';
    document.getElementById('singleSetupUi').style.display = 'flex';
    game.difficulty = null;
    document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('selected'));
    document.querySelectorAll('.court-btn').forEach(btn => btn.classList.add('disabled'));
    document.getElementById('courtTitle').style.color = '#888';
}

function selectDifficulty(diff) {
    game.difficulty = diff;
    document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('selected'));
    let btnId = diff === 'easy' ? 'btnDiff1' : (diff === 'normal' ? 'btnDiff2' : 'btnDiff3');
    document.getElementById(btnId).classList.add('selected');
    document.querySelectorAll('.court-btn').forEach(btn => btn.classList.remove('disabled'));
    document.getElementById('courtTitle').style.color = '#fff';
}

function selectCourt(side) {
    if (!game.difficulty) return; 
    game.playerSide = side;
    game.isSingle = true;
    document.getElementById('singleSetupUi').style.display = 'none';
    startGame();
}

function startMultiGame() {
    game.isSingle = false;
    startGame();
}

function startGame() {
    document.getElementById('menuUi').style.display = 'none';
    document.getElementById('singleSetupUi').style.display = 'none';
    document.getElementById('ui').style.display = 'flex';
    
    let p1IsHuman = true;
    let p2IsHuman = true;
    let p1Diff = 'normal';
    let p2Diff = 'normal';

    if (game.isSingle) {
        if (game.playerSide === 'left') {
            p1IsHuman = true;
            p2IsHuman = false;
            p2Diff = game.difficulty;
        } else {
            p1IsHuman = false;
            p2IsHuman = true;
            p1Diff = game.difficulty;
        }
    }

    p1 = new Player(200, GROUND_Y - PLAYER_SIZE, true, !p1IsHuman, p1Diff);
    p2 = new Player(1020, GROUND_Y - PLAYER_SIZE, false, !p2IsHuman, p2Diff);
    
    resetPositions();
    game.score = [0, 0];
    document.getElementById('score1').innerText = '0';
    document.getElementById('score2').innerText = '0';
    
    game.state = 'FADEIN_READY';
    game.timer = 120;
    game.fadeAlpha = 1;
    game.timeScale = window.appSettings ? window.appSettings.speed : 1.2; 
}

class Player {
    constructor(x, y, isPlayer1, isAI = false, aiDifficulty = 'normal') {
        this.x = x;
        this.y = y;
        this.width = PLAYER_SIZE;
        this.height = PLAYER_SIZE;
        this.vx = 0;
        this.vy = 0;
        
        this.isAI = isAI;
        this.aiDifficulty = aiDifficulty;
        this.aiKeys = { left: false, right: false, jump: false, down: false, action: false };
        this.aiTimer = 0;

        if (this.isAI) {
            if (this.aiDifficulty === 'easy') this.baseSpeed = 4.5;
            else if (this.aiDifficulty === 'normal') this.baseSpeed = 7;
            else if (this.aiDifficulty === 'hard') this.baseSpeed = 13.5;
        } else {
            this.baseSpeed = 7;
        }

        this.jumpPower = JUMP_POWER; 
        this.isPlayer1 = isPlayer1;
        
        this.isGrounded = false;
        this.isSliding = false;
        this.slideTimer = 0;
        this.slideDir = 1; 
        this.bufferTimer = 0;
        this.hitCooldown = 0;
        this.prevAction = false;
        this.prevDown = false;
        this.jumpLocked = false; 
        
        this.idleImg = document.getElementById('pandaIdle');
        this.walkImg = document.getElementById('pandaWalk');
        this.slideImg = document.getElementById('pandaSlide');
        this.delayImg = document.getElementById('pandaDelay');
        
        this.controls = isPlayer1 ? 
            { left: 'd', right: 'g', jump: 'r', down: 'f', action: 'z' } :
            { left: 'arrowleft', right: 'arrowright', jump: 'arrowup', down: 'arrowdown', action: 'enter' };
        this.domElement = document.getElementById(isPlayer1 ? 'p1Gif' : 'p2Gif');
        this.domElement.style.width = (this.width / canvas.width) * 100 + '%';
        this.domElement.style.height = (this.height / canvas.height) * 100 + '%';
        
        this.hitboxDom = document.getElementById(isPlayer1 ? 'p1Hitbox' : 'p2Hitbox');
        
        this.currentAnim = null; 
    }

    updateHardAI(shuttle) {
        this.aiKeys = { left: false, right: false, jump: false, down: false, action: false };
        if (game.state !== 'PLAYING' && game.state !== 'SERVING' && game.state !== 'FADEIN_READY') return;

        const isServing = game.state === 'SERVING' &&
            ((game.server === 1 && this.isPlayer1) || (game.server === 2 && !this.isPlayer1));
        if (isServing) {
            this.aiTimer++;
            if (this.aiTimer > 18) {
                this.aiKeys.jump = true;
                this.aiKeys.action = true;
                this.aiKeys[this.isPlayer1 ? 'right' : 'left'] = true;
                this.aiTimer = 0;
            }
            return;
        }

        const onMySide = this.isPlayer1 ? shuttle.x < NET_X : shuttle.x > NET_X;
        const centerX = this.x + this.width / 2;
        const centerY = this.y + this.height / 2;
        const homeX = this.isPlayer1 ? NET_X * 0.48 : NET_X + (canvas.width - NET_X) * 0.52;
        let targetX = homeX;
        let interceptFrames = Infinity;

        if (onMySide) {
            const sim = { x: shuttle.x, y: shuttle.y, vx: shuttle.vx, vy: shuttle.vy, radius: shuttle.radius };
            for (let frame = 0; frame < 240; frame++) {
                sim.vx *= SHUTTLECOCK_DRAG;
                sim.vy *= SHUTTLECOCK_DRAG;
                sim.vy += GRAVITY * 0.85;
                sim.x += sim.vx;
                sim.y += sim.vy;
                resolveNetCollision(sim);
                if (sim.x - sim.radius < 0 || sim.x + sim.radius > canvas.width) sim.vx *= -0.5;

                const stillMine = this.isPlayer1 ? sim.x < NET_X : sim.x > NET_X;
                if (stillMine && sim.vy > 0 && sim.y >= GROUND_Y - 105) {
                    interceptFrames = frame;
                    targetX = sim.x + (this.isPlayer1 ? -28 : 28);
                    break;
                }
            }
            if (!Number.isFinite(interceptFrames)) targetX = shuttle.x + (this.isPlayer1 ? -28 : 28);
        }

        const minCenter = this.isPlayer1 ? this.width / 2 : NET_X + NET_WIDTH / 2 + this.width / 2;
        const maxCenter = this.isPlayer1 ? NET_X - NET_WIDTH / 2 - this.width / 2 : canvas.width - this.width / 2;
        targetX = Math.max(minCenter, Math.min(maxCenter, targetX));
        const deltaX = targetX - centerX;
        if (Math.abs(deltaX) > 2) this.aiKeys[deltaX > 0 ? 'right' : 'left'] = true;

        const distance = Math.hypot(shuttle.x - centerX, shuttle.y - centerY);
        if (onMySide && this.isGrounded && interceptFrames < 48 && shuttle.y < centerY - 25) {
            this.aiKeys.jump = true;
        }
        // 하드는 지연이나 확률적 실수 없이 닿는 즉시 타격한다.
        if (onMySide && distance <= HITBOX_RADIUS + shuttle.radius + 8) {
            this.aiKeys.action = true;
        }
    }

    updateAI(shuttle) {
        if (!this.isAI) return;
        if (this.aiDifficulty === 'hard') {
            this.updateHardAI(shuttle);
            return;
        }
        this.aiKeys = { left: false, right: false, jump: false, down: false, action: false };

        if (game.state !== 'PLAYING' && game.state !== 'SERVING' && game.state !== 'FADEIN_READY') return;

        let isServing = game.state === 'SERVING' && ((game.server === 1 && this.isPlayer1) || (game.server === 2 && !this.isPlayer1));

        if (isServing) {
            this.aiTimer++;
            if (this.aiTimer > 45) { 
                this.aiKeys.jump = true;
                this.aiKeys.action = true; 
                if (this.aiDifficulty === 'hard') this.aiKeys[this.isPlayer1 ? 'right' : 'left'] = true; 
                this.aiTimer = 0;
            }
            return;
        }

        let myCenter = this.x + this.width / 2;
        let isShuttleOnMySide = this.isPlayer1 ? shuttle.x < NET_X : shuttle.x > NET_X;
        
        let framesToIntercept = -1;
        let predictedX = shuttle.x;
        
        if (isShuttleOnMySide) {
            let simX = shuttle.x, simY = shuttle.y, simVx = shuttle.vx, simVy = shuttle.vy;
            for (let i = 0; i < 150; i++) {
                simVx *= SHUTTLECOCK_DRAG;
                simVy *= SHUTTLECOCK_DRAG;
                simVy += GRAVITY * 0.85;
                simX += simVx;
                simY += simVy;
                
                        const simulatedShuttle = { x: simX, y: simY, vx: simVx, vy: simVy, radius: shuttle.radius };
                resolveNetCollision(simulatedShuttle);
                simX = simulatedShuttle.x;
                simY = simulatedShuttle.y;
                simVx = simulatedShuttle.vx;
                simVy = simulatedShuttle.vy;
                
                if (simX - shuttle.radius < 0 || simX + shuttle.radius > canvas.width) {
                    simVx *= -0.5;
                }
                
                if (simY >= GROUND_Y - this.height - 80) {
                    framesToIntercept = i;
                    predictedX = simX;
                    break;
                }
            }
        }

        let targetX = myCenter;
        // AI가 셔틀콕 바로 밑이 아니라 살짝 뒤에 위치하도록 오프셋 적용
        let offset = this.isPlayer1 ? -25 : 25; 

        if (!isShuttleOnMySide) {
            let netLeft = NET_X - NET_WIDTH/2;
            let netRight = NET_X + NET_WIDTH/2;
            let myMinX = this.isPlayer1 ? 0 : netRight + this.width/2;
            let myMaxX = this.isPlayer1 ? netLeft - this.width/2 : canvas.width;
            targetX = (myMinX + myMaxX) / 2;
        } else {
            if (this.aiDifficulty === 'hard') {
                targetX = (framesToIntercept !== -1) ? predictedX + offset : shuttle.x + offset;
            } else if (this.aiDifficulty === 'normal') {
                targetX = (framesToIntercept !== -1) ? predictedX + offset + (Math.random() * 40 - 20) : shuttle.x + offset;
            } else {
                targetX = shuttle.x + offset + (Math.random() * 100 - 50);
            }
        }
        
        if (this.isPlayer1) targetX = Math.max(this.width/2, Math.min(NET_X - NET_WIDTH/2 - this.width/2, targetX));
        else targetX = Math.max(NET_X + NET_WIDTH/2 + this.width/2, Math.min(canvas.width - this.width/2, targetX));

        let diffX = targetX - myCenter;
        let moveThreshold = this.aiDifficulty === 'hard' ? 5 : (this.aiDifficulty === 'normal' ? 10 : 25);
        
        if (Math.abs(diffX) > moveThreshold) {
            if (diffX > 0) this.aiKeys.right = true;
            else this.aiKeys.left = true;
        }
        
        if (this.aiDifficulty === 'easy' && Math.random() < 0.05) {
            this.aiKeys.left = false;
            this.aiKeys.right = false; 
        }

        if (isShuttleOnMySide) {
            let xDist = Math.abs(shuttle.x - myCenter);
            let distToShuttle = Math.sqrt((shuttle.x - myCenter) ** 2 + (shuttle.y - (this.y + this.height/2)) ** 2);
            
            let shouldJump = false;
            let shouldSwing = false;
            let shouldSlide = false;
            
            // 각도 기반으로 이상적인 타격 타이밍 계산 (위쪽 && 앞쪽일 때 유리)
            let relX = shuttle.x - myCenter;
            let relY = shuttle.y - (this.y + this.height/2);
            let isFavorableAngle = false;
            if (this.isPlayer1 && relX > 0 && relY < 0) isFavorableAngle = true;
            if (!this.isPlayer1 && relX < 0 && relY < 0) isFavorableAngle = true;

            if (this.aiDifficulty === 'hard') {
                if ((framesToIntercept > 0 && framesToIntercept <= 28) || (framesToIntercept === -1 && shuttle.y > GROUND_Y - 300 && shuttle.y < GROUND_Y - 100)) {
                    if (xDist < 80) shouldJump = true;
                }
                if (distToShuttle <= HITBOX_RADIUS) {
                    if (isFavorableAngle || distToShuttle < HITBOX_RADIUS * 0.6) shouldSwing = true;
                }
                if (this.isGrounded && framesToIntercept > 0 && framesToIntercept <= 25 && xDist > 100 && xDist < 250) {
                    shouldSlide = true;
                }
            } else if (this.aiDifficulty === 'normal') {
                if ((framesToIntercept > 0 && framesToIntercept <= 25) || (framesToIntercept === -1 && shuttle.y > GROUND_Y - 300 && shuttle.y < GROUND_Y - 100)) {
                    if (xDist < 90) shouldJump = true;
                }
                if (distToShuttle <= HITBOX_RADIUS) {
                    if (isFavorableAngle || Math.random() < 0.5) shouldSwing = true;
                }
            } else { 
                if ((framesToIntercept > 0 && framesToIntercept <= 20) || (framesToIntercept === -1 && shuttle.y > GROUND_Y - 300 && shuttle.y < GROUND_Y - 100)) {
                    if (xDist < 100 && Math.random() < 0.8) shouldJump = true; 
                }
                if (distToShuttle <= HITBOX_RADIUS) {
                    if (Math.random() < 0.4) shouldSwing = true; 
                }
            }
            
            if (shouldSlide) {
                this.aiKeys.down = true;
                this.aiKeys[this.isPlayer1 ? 'right' : 'left'] = true;
            }
            if (shouldJump && this.isGrounded) this.aiKeys.jump = true;
            
            if (shouldSwing) {
                this.aiKeys.action = true;
            }
        }
    }

    update() {
        if (this.bufferTimer > 0) this.bufferTimer--;
        if (this.hitCooldown > 0) this.hitCooldown--;

        let kLeft = this.isAI ? this.aiKeys.left : keys[this.controls.left];
        let kRight = this.isAI ? this.aiKeys.right : keys[this.controls.right];
        let kJump = this.isAI ? this.aiKeys.jump : keys[this.controls.jump];
        let kDown = this.isAI ? this.aiKeys.down : keys[this.controls.down];
        let kAction = this.isAI ? this.aiKeys.action : keys[this.controls.action];

        if (!kJump) this.jumpLocked = false;

        let actionPressed = false;
        if (kAction && !this.prevAction) actionPressed = true;
        this.prevAction = kAction;
        
        let downPressed = false;
        if (kDown && !this.prevDown) downPressed = true;
        this.prevDown = kDown;

        let isFadeInReady = game.state === 'FADEIN_READY';
        let isServing = game.state === 'SERVING' && ((game.server === 1 && this.isPlayer1) || (game.server === 2 && !this.isPlayer1));

        if (downPressed && this.isGrounded && !this.isSliding && !isServing && !isFadeInReady) {
            this.isSliding = true;
            this.slideTimer = 48; 
            if (kLeft) this.slideDir = -1;
            else if (kRight) this.slideDir = 1;
            else this.slideDir = this.isPlayer1 ? 1 : -1;
        }

        if (actionPressed) {
            if (this.bufferTimer === 0 && !isFadeInReady) {
                this.bufferTimer = 24; 
            }
        }

        if (this.isSliding) {
            this.slideTimer--;
            if (this.slideTimer > 18) {
                this.vx = 10 * this.slideDir;
                let progress = (48 - this.slideTimer) / 30; 
                this.y = (GROUND_Y - this.height) - 45 * Math.sin(Math.PI * progress);
            } 
            else {
                this.vx = 0;
                this.y = GROUND_Y - this.height;
            }
            if (this.slideTimer <= 0) {
                this.isSliding = false;
                this.vx = 0; 
            }
        } else {
            if (kLeft) this.vx = -this.baseSpeed;
            else if (kRight) this.vx = this.baseSpeed;
            else this.vx = 0;
        }

        if (kJump && this.isGrounded && !this.isSliding && !isServing && !isFadeInReady && !this.jumpLocked) {
            this.vy = this.jumpPower;
            this.isGrounded = false;
        }

        if (!this.isSliding || this.slideTimer <= 18) {
            this.vy += GRAVITY;
            this.y += this.vy;
            this.x += this.vx;
        } else {
            this.x += this.vx;
            this.vy = 0;
        }

        if (this.y + this.height >= GROUND_Y) {
            this.y = GROUND_Y - this.height;
            this.vy = 0;
            this.isGrounded = true;
        } else {
            this.isGrounded = false;
        }

        if (this.isPlayer1) {
            if (this.x < 0) this.x = 0;
            if (this.x + this.width > NET_X - NET_WIDTH/2) this.x = NET_X - NET_WIDTH/2 - this.width;
        } else {
            if (this.x < NET_X + NET_WIDTH/2) this.x = NET_X + NET_WIDTH/2;
            if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;
        }
    }

    draw(ctx) {
        ctx.save();
        ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
        ctx.beginPath();
        let shadowScale = Math.max(0.5, 1 - (GROUND_Y - (this.y + this.height)) / 200);
        ctx.ellipse(this.x + this.width / 2, GROUND_Y, (this.width / 1.5) * shadowScale, 8 * shadowScale, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        let targetAnim = 'idle';
        let targetSrc = '판다.png';

        if (this.isSliding) {
            if (this.slideTimer > 18) {
                targetAnim = 'slide';
                targetSrc = '슬라이딩.png';
            } else {
                targetAnim = 'delay';
                targetSrc = '딜레이.png';
            }
        } else if (this.vx !== 0 && this.isGrounded) {
            targetAnim = 'walk';
            targetSrc = '걷기.gif';
        }

        if (this.currentAnim !== targetAnim) {
            this.currentAnim = targetAnim;
            this.domElement.src = targetSrc;
        }

        this.domElement.style.left = (this.x / canvas.width) * 100 + '%';
        this.domElement.style.top = (this.y / canvas.height) * 100 + '%';
        this.domElement.style.display = 'block';
        this.domElement.style.opacity = 1 - game.fadeAlpha;

        let scaleX = (this.isPlayer1 ? 1 : -1);
        if (this.isSliding) scaleX = this.slideDir;
        this.domElement.style.transform = `scale(${scaleX}, 1)`;
        
        let pCenterX = this.x + this.width / 2;
        let pCenterY = this.y + this.height / 2;
        this.hitboxDom.style.width = ((HITBOX_RADIUS * 2) / canvas.width) * 100 + '%';
        this.hitboxDom.style.left = (pCenterX / canvas.width) * 100 + '%';
        this.hitboxDom.style.top = (pCenterY / canvas.height) * 100 + '%';
        this.hitboxDom.style.display = 'block';
        this.hitboxDom.style.opacity = 1 - game.fadeAlpha;
    }
}

class Shuttlecock {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 11.2;
        this.vx = 0;
        this.vy = 0;
        this.isDead = false;
        this.img = shuttleImg;
        this.domElement = document.getElementById('shuttleDom');
    }

    update() {
        this.vx *= SHUTTLECOCK_DRAG;
        this.vy *= SHUTTLECOCK_DRAG;
        this.vy += GRAVITY * 0.85;

        this.x += this.vx;
        this.y += this.vy;

        resolveNetCollision(this);

        if (this.y + this.radius >= GROUND_Y) {
            this.y = GROUND_Y - this.radius;
            this.vx = 0;
            this.vy = 0;
            
            if (!this.isDead && game.state === 'PLAYING') {
                this.isDead = true;
                if (this.x < NET_X) {
                    game.score[1]++;
                    game.server = 2; 
                } else {
                    game.score[0]++;
                    game.server = 1;
                }
                document.getElementById('score1').innerText = game.score[0];
                document.getElementById('score2').innerText = game.score[1];
                
                let targetScr = window.appSettings ? window.appSettings.targetScore : 15;
                if (game.score[0] >= targetScr || game.score[1] >= targetScr) {
                    game.state = 'GAME_SET_DELAY';
                    game.timer = 180;
                    game.timeScale = 0;
                } else {
                    game.state = 'POINT_SCORED';
                    game.timer = 60; 
                    game.timeScale = 0.2; 
                }
            }
        }
        
        if (this.x - this.radius < 0 || this.x + this.radius > canvas.width) {
            this.vx *= -0.5; 
        }
    }

    draw(ctx) {
        ctx.save();
        ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
        ctx.beginPath();
        let shadowScale = Math.max(0.2, 1 - (GROUND_Y - this.y) / 400);
        ctx.ellipse(this.x, GROUND_Y, this.radius * 2 * shadowScale, 4 * shadowScale, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        let angle = 0;
        if (game.state === 'FADEIN_READY' || game.state === 'SERVING') angle = Math.PI / 2;
        else if (!this.isDead && (this.vx !== 0 || this.vy !== 0)) angle = Math.atan2(this.vy, this.vx);
        else if (this.isDead) angle = Math.PI / 2; 

        if (this.img.complete && this.img.naturalWidth !== 0) {
            let imgRatio = this.img.naturalHeight / this.img.naturalWidth;
            let drawWidth = 25; 
            let drawHeight = drawWidth * imgRatio;
            let leftPx = this.x - drawWidth * 0.85; 
            let topPx = this.y - drawHeight * 0.5;

            this.domElement.src = this.img.src;
            this.domElement.style.width = (drawWidth / canvas.width) * 100 + '%';
            this.domElement.style.height = (drawHeight / canvas.height) * 100 + '%';
            this.domElement.style.left = (leftPx / canvas.width) * 100 + '%';
            this.domElement.style.top = (topPx / canvas.height) * 100 + '%';
            this.domElement.style.transformOrigin = '85% 50%';
            this.domElement.style.transform = `rotate(${angle}rad)`;
            this.domElement.style.display = 'block';
            this.domElement.style.opacity = 1 - game.fadeAlpha;
        } else {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(angle);
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            this.domElement.style.display = 'none';
        }
    }
}

let p1 = new Player(200, GROUND_Y - PLAYER_SIZE, true);
let p2 = new Player(1020, GROUND_Y - PLAYER_SIZE, false);
let shuttle = new Shuttlecock(300, 100);

function checkHit(player, shuttle) {
    // 슬라이딩 중에는 별도의 스윙 입력 없이 접촉 자체가 스윙으로 처리된다.
    const hasActiveSwing = player.bufferTimer > 0 || player.isSliding;
    if (!hasActiveSwing || player.hitCooldown > 0) return;
    if (game.state === 'FADEIN_READY') return;

    if (game.state === 'SERVING') {
        let isServer = (game.server === 1 && player.isPlayer1) || (game.server === 2 && !player.isPlayer1);
        if (!isServer) return; 
    }

    let pCenterX = player.x + player.width / 2;
    let pCenterY = player.y + player.height / 2;
    let distance = Math.sqrt((shuttle.x - pCenterX) ** 2 + (shuttle.y - pCenterY) ** 2);

    if (distance <= HITBOX_RADIUS + shuttle.radius) {
        let kJump = player.isAI ? player.aiKeys.jump : keys[player.controls.jump];

        const relX = shuttle.x - pCenterX;
        const relY = shuttle.y - pCenterY;
        const isFrontHalf = player.isPlayer1 ? relX >= 0 : relX <= 0;
        const HIT_SPEED = 34;

        if (isFrontHalf) {
            // 앞쪽 반원은 기존 방사형 스윙을 사용한다. 앞쪽 판정 덕분에 절대 뒤로 날아가지 않는다.
            const angle = Math.atan2(relY, relX);
            shuttle.vx = Math.cos(angle) * HIT_SPEED;
            shuttle.vy = Math.sin(angle) * HIT_SPEED;
        } else {
            // 뒤쪽 반원에서 맞은 셔틀콕은 반대편으로 잘못 발사되지 않고 곧장 위로 뜬다.
            shuttle.vx = 0;
            shuttle.vy = -HIT_SPEED;
        }
        player.bufferTimer = 0;
        player.hitCooldown = 8;
        
        if (game.state === 'SERVING') {
            game.state = 'PLAYING';
            if (kJump) player.jumpLocked = true;
        }
    }
}

function resetPositions() {
    p1.x = 200; p1.y = GROUND_Y - p1.height; p1.vx = 0; p1.vy = 0; p1.isGrounded = true; p1.isSliding = false; p1.slideDir = 1; p1.currentAnim = null; p1.bufferTimer = 0; p1.hitCooldown = 0;
    p2.x = 1020; p2.y = GROUND_Y - p2.height; p2.vx = 0; p2.vy = 0; p2.isGrounded = true; p2.isSliding = false; p2.slideDir = -1; p2.currentAnim = null; p2.bufferTimer = 0; p2.hitCooldown = 0;
    shuttle.isDead = false;
    game.timeScale = window.appSettings ? window.appSettings.speed : 1.2;
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (game.state.startsWith('INTRO_')) {
        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (game.state === 'INTRO_FADEIN') {
            game.timer--;
            game.fadeAlpha = 1 - (game.timer / 60);
            if (game.timer <= 0) { game.state = 'INTRO_HOLD'; game.timer = 120; }
        } else if (game.state === 'INTRO_HOLD') {
            game.timer--;
            game.fadeAlpha = 1;
            if (game.timer <= 0) { game.state = 'INTRO_FADEOUT'; game.timer = 60; }
        } else if (game.state === 'INTRO_FADEOUT') {
            game.timer--;
            game.fadeAlpha = game.timer / 60;
            if (game.timer <= 0) { game.state = 'MENU_FADEIN'; game.timer = 60; game.fadeAlpha = 1; }
        }
        ctx.globalAlpha = Math.max(0, Math.min(1, game.fadeAlpha));
        if (introImg.complete && introImg.naturalWidth !== 0) {
            const scale = 1 / 8;
            const drawW = introImg.width * scale;
            const drawH = introImg.height * scale;
            ctx.drawImage(introImg, (canvas.width - drawW) / 2, (canvas.height - drawH) / 2, drawW, drawH);
        }
        ctx.globalAlpha = 1.0;
        requestAnimationFrame(gameLoop);
        return;
    }

    if (bgImg.complete && bgImg.naturalWidth !== 0) {
        ctx.drawImage(bgImg, 35, 0, canvas.width, canvas.height);
    } else {
        ctx.fillStyle = '#87CEEB';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#E5C287';
        ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
    }
    
    const currentNetTop = GROUND_Y - NET_HEIGHT;

    // 단순한 얇은 막대와 상단 원으로 구성된 네트
    ctx.fillStyle = '#555';
    ctx.fillRect(NET_X - NET_WIDTH / 2, currentNetTop, NET_WIDTH, NET_HEIGHT);
    ctx.beginPath();
    ctx.arc(NET_X, currentNetTop, NET_CAP_RADIUS, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#f0f0f0';
    ctx.lineWidth = 2;
    ctx.stroke();

    if (game.state === 'MENU_FADEIN') {
        game.timer--;
        game.fadeAlpha = game.timer / 60; 
        document.getElementById('menuUi').style.display = 'flex';
        document.getElementById('menuUi').style.opacity = 1 - game.fadeAlpha;
        ctx.fillStyle = `rgba(0,0,0,${game.fadeAlpha})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (game.timer <= 0) { game.state = 'MENU_IDLE'; document.getElementById('menuUi').style.opacity = 1; }
        requestAnimationFrame(gameLoop);
        return;
    } else if (game.state === 'MENU_IDLE') {
        requestAnimationFrame(gameLoop);
        return;
    }

    if (game.state === 'POINT_SCORED') {
        game.timer--;
        if (game.timer <= 0) { game.state = 'FADEOUT'; game.timer = 60; game.timeScale = 0; }
    } else if (game.state === 'GAME_SET_DELAY') {
        game.timer--;
        if (game.timer <= 0) game.state = 'GAME_SET_WAIT_KEY';
    } else if (game.state === 'GAME_SET_TRANSITION_IN') {
        game.timer--;
        if (game.timer <= 0) {
            game.state = 'GAME_SET_TRANSITION_MID'; game.timer = 60; resetPositions();
            document.getElementById('ui').style.display = 'none';
        }
    } else if (game.state === 'GAME_SET_TRANSITION_MID') {
        game.timer--;
        if (game.timer <= 0) { game.state = 'GAME_SET_TRANSITION_OUT'; game.timer = 60; showMenuDOM(); }
    } else if (game.state === 'FADEOUT') {
        game.timer--;
        game.fadeAlpha = 1 - (game.timer / 60); 
        if (game.timer <= 0) { resetPositions(); game.state = 'FADEIN_READY'; game.timer = 120; game.timeScale = window.appSettings ? window.appSettings.speed : 1.2; }
    } else if (game.state === 'FADEIN_READY') {
        game.timer--;
        game.fadeAlpha = Math.max(0, (game.timer - 60) / 60);
        if (game.timer <= 0) { game.state = 'SERVING'; game.timer = 300; }
    } else if (game.state === 'SERVING') {
        game.timer--;
        if (game.timer <= 0) { game.state = 'TIMEOUT'; game.timer = 60; game.timeScale = 0.2; game.server = game.server === 1 ? 2 : 1; }
    } else if (game.state === 'TIMEOUT') {
        game.timer--;
        if (game.timer <= 0) { game.state = 'FADEOUT'; game.timer = 60; game.timeScale = 0; }
    }

    game.timeAccumulator += game.timeScale;
    while (game.timeAccumulator >= 1) {
        p1.updateAI(shuttle);
        p2.updateAI(shuttle);
        p1.update();
        p2.update();

        // 서브 시 위치 고정을 물리 루프 안쪽으로 이동 (점프 서브 시 각도 틀어짐 방지)
        if (game.state === 'FADEIN_READY' || game.state === 'SERVING') {
            let srv = game.server === 1 ? p1 : p2;
            let cx = srv.x + srv.width / 2;
            let cy = srv.y + srv.height / 2;
            
            // 45도 / 135도 각도 계산 (-Y가 위쪽이므로 음수 값 적용)
            let angle = (game.server === 1) ? -Math.PI / 4 : -Math.PI * 3 / 4;
            // 히트박스 가장자리 살짝 안쪽에 배치
            let placeRadius = HITBOX_RADIUS * 0.85; 
            
            shuttle.x = cx + Math.cos(angle) * placeRadius;
            shuttle.y = cy + Math.sin(angle) * placeRadius;
            shuttle.vx = 0;
            shuttle.vy = 0;
        } else {
            shuttle.update();
        }

        checkHit(p1, shuttle);
        checkHit(p2, shuttle);
        game.timeAccumulator -= 1;
    }

    p1.draw(ctx);
    p2.draw(ctx);
    shuttle.draw(ctx);

    if (game.state === 'FADEIN_READY') {
        if (Math.floor((120 - game.timer) / 20) % 2 === 0) {
            ctx.fillStyle = 'red';
            ctx.font = 'bold 80px "Malgun Gothic", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Ready?', canvas.width / 2, 250);
            let srv = game.server === 1 ? p1 : p2;
            ctx.fillStyle = 'rgba(255, 0, 0, 0.4)';
            ctx.fillRect(srv.x, srv.y, srv.width, srv.height);
        }
    } else if (game.state === 'SERVING') {
        ctx.fillStyle = 'red';
        ctx.font = 'bold 80px "Malgun Gothic", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(Math.ceil(game.timer / 60), canvas.width / 2, 100);
    } else if (game.state === 'TIMEOUT') {
        ctx.fillStyle = 'red';
        ctx.font = 'bold 80px "Malgun Gothic", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Time out', canvas.width / 2, 250);
    } else if (game.state === 'GAME_SET_DELAY' || game.state === 'GAME_SET_WAIT_KEY') {
        ctx.fillStyle = 'red';
        ctx.font = 'bold 120px "Malgun Gothic", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Game set!', canvas.width / 2, 250);
        if (game.state === 'GAME_SET_WAIT_KEY') {
            ctx.fillStyle = 'white';
            ctx.font = 'bold 40px "Malgun Gothic", sans-serif';
            ctx.fillText('Z 키 혹은 Enter 키를 누르시면 경기가 종료됩니다.', canvas.width / 2, 400);
        }
    }

    if (game.fadeAlpha > 0) {
        ctx.fillStyle = `rgba(0, 0, 0, ${game.fadeAlpha})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
